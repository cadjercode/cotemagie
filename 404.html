<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — Côté Magie</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--noir:#0D0D0D;--or:#C69B3C;--or2:#D4AF61;--orf:#B8860B;--ivoire:#F4EADE;--sec:#B0A290}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--noir);color:var(--ivoire);font:400 16px/1.6 Inter,sans-serif;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
h1,h2{font-family:Cinzel,serif;color:var(--or);font-weight:700}
a{color:var(--or)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:12px 26px;border-radius:6px;font:600 16px Inter,sans-serif;text-decoration:none;transition:transform .2s,box-shadow .2s;cursor:pointer}
.btn-or{background:linear-gradient(135deg,var(--orf),var(--or));color:#1A1206;border:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(198,155,60,.25)}

/* Sky canvas */
#webgl{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}
#webgl canvas{display:block;width:100%;height:100%}

/* Content */
.content{position:relative;z-index:1;max-width:560px;padding:40px 20px}
.code{font-family:Cinzel,serif;font-size:clamp(80px,20vw,140px);font-weight:700;line-height:1;background:linear-gradient(135deg,var(--orf),var(--or),var(--or2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.title{font-size:clamp(20px,5vw,30px);margin-bottom:12px}
.desc{color:var(--sec);margin-bottom:32px;max-width:40ch;margin-left:auto;margin-right:auto}
.nav-back{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn-line{border:1.5px solid var(--or);color:var(--or);background:rgba(13,13,13,.4)}

/* Suit symbol */
.suit{display:inline-block;font-size:1.4em;color:var(--or);margin-bottom:24px;opacity:.7}
</style>
</head>
<body>
<div id="webgl"></div>

<div class="content">
  <div class="suit">✦</div>
  <div class="code">404</div>
  <h1 class="title">Page introuvable</h1>
  <p class="desc">La page que vous cherchez a disparu comme par magie… ou n'a jamais existé.</p>
  <nav class="nav-back" aria-label="Retour au site">
    <a href="/" class="btn btn-or">Retour à l'accueil</a>
    <a href="/#contact" class="btn btn-line">Contacter Francis</a>
  </nav>
</div>

<script src="assets/sky-canvas.js" defer></script>
</body>
</html>
